<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melhor Beijo da Minha Vida 💋</title>
    
    <!-- Importa a fonte Poppins do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: url('imagens/fundo.jpg') no-repeat center center fixed; /* Certifica-te de que a imagem está na pasta correta */
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            margin: 0;
            padding: 50px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        h1 {
            font-size: 2.5em;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
        }

        #contador {
            font-size: 2em;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
            animation: brilho 1s infinite alternate;
        }

        .container {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            display: inline-block;
        }

        @keyframes brilho {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 20px pink; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tempo que passou desde o melhor beijo da minha vida, aquele que vicia muito mais do que droga ❤ </h1>
        <div id="contador">Calculando...</div>
    </div>

    <script>
        function atualizarContador() {
            const primeiroBeijo = new Date(2025, 0, 14, 13, 15, 0); // Alterado para Janeiro (0 = Janeiro)
            const agora = new Date();
            const diferenca = agora - primeiroBeijo;

            const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
            const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
            const segundos = Math.floor((diferenca / 1000) % 60);

            document.getElementById("contador").innerHTML =
                `${dias} dias, ${horas} horas, ${minutos} minutos e ${segundos} segundos `;
        }

        setInterval(atualizarContador, 1000);
        atualizarContador();
    </script>

</body>
</html>
